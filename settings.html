<div class="theendless-panel inline-drawer">
    <div class="inline-drawer-toggle inline-drawer-header">
        <b>The Endless — Door Manager</b>
        <div class="inline-drawer-icon fa-solid fa-door-open down"></div>
    </div>
    <div class="inline-drawer-content">
        <!-- Current World Display -->
        <div class="theendless-current-world">
            <span class="theendless-label">Current World:</span>
            <span id="theendless_world_display" class="theendless-world-name">The Manifold</span>
        </div>

        <hr />

        <!-- Toggles -->
        <div class="theendless-toggles">
            <label class="checkbox_label" for="theendless_enabled">
                <input id="theendless_enabled" type="checkbox" />
                <span>Enable automatic door detection</span>
            </label>

            <label class="checkbox_label" for="theendless_prevent_repeat">
                <input id="theendless_prevent_repeat" type="checkbox" />
                <span>Prevent revisiting same world immediately</span>
            </label>

            <label class="checkbox_label" for="theendless_notifications">
                <input id="theendless_notifications" type="checkbox" />
                <span>Show transition notifications</span>
            </label>

        </div>

        <hr />

        <!-- Injection Depth -->
        <div class="theendless-depth">
            <label for="theendless_depth">
                Injection depth:
                <input id="theendless_depth" type="number" min="1" max="10" value="4" class="text_pole" style="width: 60px;" />
            </label>
            <small>How many messages deep the world context note is injected (lower = closer to latest message)</small>
        </div>

        <hr />

        <!-- Manual Controls -->
        <div class="theendless-controls">
            <div class="theendless-control-row">
                <select id="theendless_world_select" class="text_pole">
                    <option value="">— Select World —</option>
                </select>
                <input id="theendless_go_world" class="menu_button" type="button" value="Go" />
            </div>
            <div class="theendless-control-row">
                <input id="theendless_random_door" class="menu_button" type="button" value="Random Door" />
                <input id="theendless_go_manifold" class="menu_button" type="button" value="Return to Manifold" />
            </div>
            <div class="theendless-control-row">
                <input id="theendless_enable_all" class="menu_button" type="button" value="Refresh Lore" title="Clear cache and re-read lore for current world" />
                <input id="theendless_disable_all" class="menu_button" type="button" value="Clear All Lore" title="Clear all injected lore — return to Manifold" />
            </div>
        </div>

        <hr />

        <!-- World Registry (dynamic) -->
        <div class="theendless-worlds-section">
            <div class="theendless-section-header">
                <b>World Registry</b>
                <small>Worlds that doors can lead to. Add any World Info lorebook as a destination.</small>
            </div>

            <!-- Add World -->
            <div class="theendless-add-world">
                <select id="theendless_add_book_select" class="text_pole">
                    <option value="">— Select a World Info book —</option>
                </select>
                <input id="theendless_add_world_btn" class="menu_button" type="button" value="Add World" />
            </div>

            <!-- World List -->
            <div id="theendless_world_list" class="theendless-world-list">
                <!-- Populated dynamically by ui.js -->
            </div>
        </div>
    </div>
</div>
